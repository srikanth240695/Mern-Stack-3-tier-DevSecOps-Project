version: 0.2

phases:

  install:
    commands:

      - wget https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip

      - unzip terraform_1.8.5_linux_amd64.zip

      - mv terraform /usr/local/bin/

  pre_build:
    commands:

      - cd awscicd/jenkins-server

      - terraform init -reconfigure -backend-config=backend/nonprod.hcl

  build:
    commands:

      - terraform plan -var-file=env/jenkins-dev.tfvars -out=tfplan

artifacts:
  files:
    - awscicd/jenkins-server/tfplan
